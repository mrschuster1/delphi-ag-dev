<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Decorative lines -->
  <line x1="0" y1="8" x2="1200" y2="8" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>
  <line x1="0" y1="292" x2="1200" y2="292" stroke="url(#accent)" stroke-width="3" opacity="0.8"/>

  <!-- Left geometric decoration -->
  <polygon points="0,0 120,0 0,120" fill="#e94560" opacity="0.15"/>
  <polygon points="0,0 60,0 0,60" fill="#e94560" opacity="0.25"/>

  <!-- Right geometric decoration -->
  <polygon points="1200,300 1080,300 1200,180" fill="#f5a623" opacity="0.15"/>
  <polygon points="1200,300 1140,300 1200,240" fill="#f5a623" opacity="0.25"/>

  <!-- Code bracket decorations -->
  <text x="80" y="175" font-family="Courier New, monospace" font-size="120" fill="#e94560" opacity="0.06" font-weight="bold">{</text>
  <text x="1050" y="175" font-family="Courier New, monospace" font-size="120" fill="#f5a623" opacity="0.06" font-weight="bold">}</text>

  <!-- Delphi logo-inspired diamond -->
  <polygon points="185,150 210,120 235,150 210,180" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" filter="url(#glow)"/>
  <polygon points="185,150 210,120 235,150 210,180" fill="url(#accent)" opacity="0.1"/>

  <!-- Main title -->
  <text x="600" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="52" font-weight="700" fill="url(#text-grad)" filter="url(#glow)">delphi-ag-dev</text>

  <!-- Accent bar under title -->
  <rect x="380" y="142" width="440" height="3" fill="url(#accent)" rx="2"/>

  <!-- Subtitle -->
  <text x="600" y="185" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="21" fill="#a0aec0" letter-spacing="1">Antigravity Agent Plugin for Delphi Development</text>

  <!-- Tagline -->
  <text x="600" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#718096" font-style="italic">Stop writing sloppy Pascal. Start shipping senior-grade Delphi.</text>

  <!-- Bottom badges row -->
  <!-- VCL badge -->
  <rect x="420" y="250" width="60" height="22" rx="4" fill="#e94560" opacity="0.8"/>
  <text x="450" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" font-weight="600">VCL</text>

  <!-- FMX badge -->
  <rect x="490" y="250" width="60" height="22" rx="4" fill="#f5a623" opacity="0.8"/>
  <text x="520" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" font-weight="600">FMX</text>

  <!-- Delphi 11+ badge -->
  <rect x="560" y="250" width="90" height="22" rx="4" fill="#0f3460" stroke="#e94560" stroke-width="1" opacity="0.9"/>
  <text x="605" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#e94560" font-weight="600">DELPHI 11+</text>

  <!-- DUnitX badge -->
  <rect x="660" y="250" width="70" height="22" rx="4" fill="#4a90d9" opacity="0.8"/>
  <text x="695" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" font-weight="600">DUnitX</text>

  <!-- SOLID badge -->
  <rect x="740" y="250" width="60" height="22" rx="4" fill="#48bb78" opacity="0.8"/>
  <text x="770" y="265" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="white" font-weight="600">SOLID</text>
</svg>
